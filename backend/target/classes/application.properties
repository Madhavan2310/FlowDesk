spring.application.name=expense-workflow

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/expense_workflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=expenseWorkflowSecretKey2024SuperSecureKeyForJWTTokenGeneration
app.jwt.expiration=86400000

# Server
server.port=8080

# CORS
app.cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.expenseflow=DEBUG
